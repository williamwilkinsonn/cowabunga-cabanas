<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Cowabunga Cabanas</title>
    <style>
        /* Basic styles for hamburger menu */
        .hamburger {
            display: none;
            cursor: pointer;
            padding: 10px;
        }
        .menu {
            display: none;
            flex-direction: column;
        }
        @media (max-width: 900px) {
            .view-tabs {
                display: none;
            }
            .hamburger {
                display: block;
            }
            .menu.active {
                display: flex;
                animation: slideDown 0.5s;
            }
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <nav>
        <div class="view-tabs">
            <a href="#manager">Manager</a>
            <a href="#kitchen">Kitchen</a>
            <a href="#tv-display">Television Display</a>
            <a href="#headcount">Headcount</a>
            <a href="#break-room">Break Room Orders</a>
            <a href="#reports">Reports & Analytics</a>
        </div>
        <div class="hamburger" onclick="toggleMenu()">
            &#9776;
        </div>
        <div class="menu" id="dropdownMenu">
            <a href="#manager" onclick="closeMenu()">Manager</a>
            <a href="#kitchen" onclick="closeMenu()">Kitchen</a>
            <a href="#tv-display" onclick="closeMenu()">Television Display</a>
            <a href="#headcount" onclick="closeMenu()">Headcount</a>
            <a href="#break-room" onclick="closeMenu()">Break Room Orders</a>
            <a href="#reports" onclick="closeMenu()">Reports & Analytics</a>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.toggle('active');
        }

        function closeMenu() {
            const menu = document.getElementById('dropdownMenu');
            menu.classList.remove('active');
        }
    </script>
</body>
</html>
